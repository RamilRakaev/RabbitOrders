services:
  orders.api:
    image: ${DOCKER_REGISTRY-}ordersapi
    build:
      context: .
      dockerfile: Orders.Api/Dockerfile
    environment:
      - RabbitMqConnectionOptions__HostName=rabbitmq  # <--- Ключевой момент!
    depends_on:
      - rabbitmq
    ports:
    - "5096:8080"
  rabbitmq:
    image: rabbitmq:3-management
